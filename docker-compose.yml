services:
  rag-app:
    build: .
    container_name: rag-eletrico-app
    env_file:
      - .env
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    depends_on:
      - qdrant
    command: streamlit run src/ui/app.py --server.address=0.0.0.0

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: