services:
  rag-app:
    build: .
    container_name: rag-eletrico-app
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: python -m scripts.test_retrieval

  app:
    build: .
    container_name: rag_app

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage: