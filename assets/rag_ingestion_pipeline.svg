<svg width="100%" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family: system-ui, -apple-system, sans-serif; background: #ffffff;">
<title>Pipeline de ingestão — RAG domínio elétrico</title>
<desc>Fluxo de ingestão: JSONs ANEEL → Parser → Chunker → Embedder → Qdrant</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- label -->
<text x="40" y="38" font-size="12" fill="#888780">ingestão de dados</text>

<!-- outer container -->
<rect x="40" y="52" width="600" height="390" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>

<!-- Fonte -->
<rect x="68" y="88" width="136" height="68" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="136" y="119" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Fonte</text>
<text x="136" y="139" font-size="12" fill="#5F5E5A" text-anchor="middle">JSONs ANEEL 2016–22</text>

<line x1="204" y1="122" x2="228" y2="122" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Parser -->
<rect x="228" y="88" width="124" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="290" y="119" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Parser</text>
<text x="290" y="139" font-size="12" fill="#0F6E56" text-anchor="middle">texto + metadados</text>

<line x1="352" y1="122" x2="376" y2="122" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Chunker -->
<rect x="376" y="88" width="124" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="438" y="119" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Chunker</text>
<text x="438" y="139" font-size="12" fill="#0F6E56" text-anchor="middle">proposições + overlap</text>

<line x1="500" y1="122" x2="524" y2="122" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Embedder -->
<rect x="524" y="88" width="100" height="68" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="574" y="119" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Embedder</text>
<text x="574" y="139" font-size="12" fill="#0F6E56" text-anchor="middle">E5 / OpenAI</text>

<line x1="574" y1="156" x2="574" y2="196" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Qdrant -->
<rect x="440" y="196" width="252" height="92" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="566" y="233" font-size="14" font-weight="500" fill="#26215C" text-anchor="middle">Qdrant</text>
<text x="566" y="253" font-size="12" fill="#534AB7" text-anchor="middle">vector store dedicado</text>
<text x="566" y="270" font-size="12" fill="#534AB7" text-anchor="middle">HNSW · cosine · 1536d</text>

<!-- vector payload boxes -->
<rect x="440" y="320" width="116" height="56" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="498" y="346" font-size="12" fill="#534AB7" text-anchor="middle">vector</text>
<text x="498" y="364" font-size="12" fill="#534AB7" text-anchor="middle">[1536 dims]</text>

<rect x="572" y="320" width="116" height="56" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="630" y="346" font-size="12" fill="#534AB7" text-anchor="middle">payload</text>
<text x="630" y="364" font-size="12" fill="#534AB7" text-anchor="middle">tipo · data · texto</text>

<line x1="498" y1="288" x2="498" y2="320" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="630" y1="288" x2="630" y2="320" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Supabase -->
<rect x="68" y="196" width="300" height="68" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="218" y="227" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Supabase</text>
<text x="218" y="247" font-size="12" fill="#5F5E5A" text-anchor="middle">dados estruturados (opcional)</text>

<!-- dashed connection -->
<path d="M438 243 L380 243 L380 230 L218 230" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- footer note -->
<text x="68" y="418" font-size="12" fill="#888780">cada chunk vira um point: { id, vector, payload }</text>
</svg>
