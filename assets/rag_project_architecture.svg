<text x="340" y="73" font-size="12" fill="#5F5E5A" text-anchor="middle">ui/app.py</text>

<line x1="340" y1="84" x2="340" y2="114" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

