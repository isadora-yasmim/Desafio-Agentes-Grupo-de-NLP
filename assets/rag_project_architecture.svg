<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family: system-ui, -apple-system, sans-serif; background: #ffffff;">
<title>Estrutura geral do projeto RAG — domínio elétrico</title>
<desc>Diagrama estrutural mostrando as camadas do projeto: UI, backend com ingestão, retrieval, agent e eval, infraestrutura com Qdrant e Supabase, e testes</desc>
