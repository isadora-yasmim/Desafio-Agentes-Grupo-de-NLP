<svg width="100%" viewBox="0 0 680 560" role="img" xmlns="http://www.w3.org/2000/svg"
     style="font-family: system-ui, -apple-system, sans-serif; background: #ffffff;">
<title>Pipeline de retrieval — RAG domínio elétrico</title>
<desc>Fluxo de busca: query → expansão de termos → retrieval híbrido → fusão RRF → reranker → MMR → LLM → resposta</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text x="40" y="38" font-size="12" fill="#888780">retrieval + geração</text>

<!-- UI -->
<rect x="40" y="52" width="130" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="105" y="79" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">UI Streamlit</text>
<text x="105" y="99" font-size="12" fill="#5F5E5A" text-anchor="middle">pergunta do usuário</text>

<line x1="170" y1="80" x2="200" y2="80" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Expansão de termos -->
<rect x="200" y="52" width="146" height="56" rx="8" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
<text x="273" y="75" font-size="14" font-weight="500" fill="#412402" text-anchor="middle">Expansão de termos</text>
<text x="273" y="95" font-size="12" fill="#854F0B" text-anchor="middle">sinônimos regulatórios</text>

<line x1="346" y1="80" x2="380" y2="80" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Retrieval híbrido container -->
<rect x="380" y="36" width="260" height="106" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="510" y="60" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Retrieval híbrido</text>

<!-- BM25 -->
<rect x="394" y="68" width="106" height="60" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="447" y="92" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">BM25</text>
<text x="447" y="112" font-size="12" fill="#0F6E56" text-anchor="middle">busca por termos</text>

<!-- Embedding -->
<rect x="520" y="68" width="106" height="60" rx="6" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="573" y="92" font-size="14" font-weight="500" fill="#085041" text-anchor="middle">Embedding</text>
<text x="573" y="112" font-size="12" fill="#0F6E56" text-anchor="middle">busca semântica</text>

<line x1="510" y1="142" x2="510" y2="178" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Fusão RRF -->
<rect x="380" y="178" width="260" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="510" y="202" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Fusão RRF</text>
<text x="510" y="222" font-size="12" fill="#5F5E5A" text-anchor="middle">semantic_score · bm25_score</text>

<line x1="510" y1="234" x2="510" y2="264" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Reranker -->
<rect x="380" y="264" width="260" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="287" font-size="14" font-weight="500" fill="#26215C" text-anchor="middle">Reranker</text>
<text x="510" y="307" font-size="12" fill="#534AB7" text-anchor="middle">cross-encoder · rerank_score</text>

<line x1="510" y1="320" x2="510" y2="350" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- MMR -->
<rect x="380" y="350" width="260" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text x="510" y="373" font-size="14" font-weight="500" fill="#26215C" text-anchor="middle">Diversidade MMR</text>
<text x="510" y="393" font-size="12" fill="#534AB7" text-anchor="middle">evita chunks redundantes</text>

<line x1="380" y1="378" x2="320" y2="378" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LLM -->
<rect x="140" y="350" width="180" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text x="230" y="373" font-size="14" font-weight="500" fill="#4A1B0C" text-anchor="middle">LLM</text>
<text x="230" y="393" font-size="12" fill="#993C1D" text-anchor="middle">GPT-4o-mini + contexto</text>

<line x1="230" y1="406" x2="230" y2="436" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Resposta -->
<rect x="40" y="436" width="380" height="68" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="230" y="463" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle">Resposta + transparência</text>
<text x="230" y="483" font-size="12" fill="#5F5E5A" text-anchor="middle">chunks · scores · fonte · confiança</text>

<!-- Score badges -->
<rect x="440" y="436" width="76" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="478" y="457" font-size="12" fill="#534AB7" text-anchor="middle">semantic</text>

<rect x="524" y="436" width="64" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="556" y="457" font-size="12" fill="#534AB7" text-anchor="middle">rerank</text>

<rect x="596" y="436" width="52" height="32" rx="6" fill="#EEEDFE" stroke="#AFA9EC" stroke-width="0.5"/>
<text x="622" y="457" font-size="12" fill="#534AB7" text-anchor="middle">final</text>

<text x="440" y="492" font-size="12" fill="#888780">scores individuais expostos na UI</text>

<line x1="420" y1="456" x2="440" y2="456" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="3 2" marker-end="url(#arrow)"/>
</svg>
